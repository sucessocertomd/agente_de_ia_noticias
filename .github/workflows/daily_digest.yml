name: 🤖 Morning AI Briefing

on:
  schedule:
   # 09:00 UTC = 06:00 Brasília (UTC-3)
    - cron: '0 9 * * *'
    timezone: "America/Sao_Paulo"  # Suporte novo de 2026 [^1^]
  workflow_dispatch:  # Permite rodar manualmente para testes

jobs:
  briefing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Morning Briefing
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}  # Fallback
        run: python src/main.py

      - name: Upload logs (se falhar)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: logs/
