name: NewsAgent — Daily Digest

on:
  schedule:
    # FIX: minuto 11 em vez de 0 — evita o pico de carga do início da hora
    # 09:11 UTC = 06:11h (Horário de Brasília)
    - cron: '11 9 * * *'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp beautifulsoup4 lxml python-dotenv requests groq

      - name: Criar pastas
        run: mkdir -p logs data

      # FIX: restaura o cache de hashes entre execuções
      # sem isso, todas as notícias são consideradas "novas" todo dia
      - name: Restaurar cache de hashes vistos
        uses: actions/cache@v4
        with:
          path: data/seen_hashes.json
          key: seen-hashes-${{ runner.os }}
          restore-keys: |
            seen-hashes-

      - name: Executar NewsAgent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MAX_NEWS: '10'
        run: python agent.py

      - name: Upload logs como artefato
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-logs-${{ github.run_id }}
          path: logs/
