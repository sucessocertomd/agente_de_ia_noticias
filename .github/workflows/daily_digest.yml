name: NewsAgent — Daily Digest

on:
  schedule:
    # 09:11 UTC = 06:11h (Horário de Brasília)
    - cron: '11 9 * * *'
  workflow_dispatch:

env:
  # Opt-in para Node.js 24 agora, antes de virar obrigatório em junho/2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp beautifulsoup4 lxml python-dotenv requests groq

      - name: Criar pastas
        run: mkdir -p logs data

      - name: Restaurar cache de hashes vistos
        uses: actions/cache@v4.2.3
        with:
          path: data/seen_hashes.json
          key: seen-hashes-${{ runner.os }}
          restore-keys: |
            seen-hashes-

      - name: Executar NewsAgent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MAX_NEWS: '10'
        run: python agent.py

      - name: Upload logs como artefato
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: agent-logs-${{ github.run_id }}
          path: logs/
