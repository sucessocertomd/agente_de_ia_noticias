name: NewsAgent — Daily Digest

on:
  schedule:
    # 09:00 UTC = 06:00 Brasília (UTC-3)
    - cron: '0 9 * * *'
  workflow_dispatch:  # permite disparar manualmente

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install aiohttp beautifulsoup4 lxml APScheduler python-dotenv requests
          pip install groq   # troque pelo seu provider

      - name: Criar pastas
        run: mkdir -p logs data

      - name: Executar NewsAgent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_PROVIDER:        ${{ secrets.AI_PROVIDER }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          SEND_HOUR:          '6'
          SEND_MINUTE:        '0'
          MAX_NEWS:           '10'
        run: python agent.py --now

      - name: Upload logs como artefato
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-logs-${{ github.run_id }}
          path: logs/
