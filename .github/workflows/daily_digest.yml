name: NewsAgent — Daily Digest

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    # FIX: reduzido para 10min — o script tem timeout interno de 5min,
    # então se ultrapassar 10min algo externo travou
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp beautifulsoup4 lxml python-dotenv requests groq

      - name: Criar pastas
        run: mkdir -p logs data

      - name: Executar NewsAgent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MAX_NEWS: '10'
        # FIX: removido "--now" — o script não tem argparse e o argumento era ignorado.
        # O script já executa e encerra por si só.
        run: python agent.py

      - name: Upload logs como artefato
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-logs-${{ github.run_id }}
          path: logs/
